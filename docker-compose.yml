services:
  nginx:
    image: nginx:1.27-alpine
    container_name: products-nginx
    depends_on:
      - backend1
      - backend2
      - backend3
    ports:
      - "8081:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - app-net

  backend1:
    build:
      context: ./backend
    container_name: products-backend-1
    environment:
      - NODE_ENV=production
      - PORT=3000
      - INSTANCE_NAME=backend1
    expose:
      - "3000"
    networks:
      - app-net

  backend2:
    build:
      context: ./backend
    container_name: products-backend-2
    environment:
      - NODE_ENV=production
      - PORT=3000
      - INSTANCE_NAME=backend2
    expose:
      - "3000"
    networks:
      - app-net

  backend3:
    build:
      context: ./backend
    container_name: products-backend-3
    environment:
      - NODE_ENV=production
      - PORT=3000
      - INSTANCE_NAME=backend3
    expose:
      - "3000"
    networks:
      - app-net

networks:
  app-net:
    driver: bridge
